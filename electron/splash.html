<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgenticTM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #1b1b1b;
      color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 10px;
      display: block;
      object-fit: contain;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #a874c0 0%, #19adcb 50%, #a874c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #a0a0a0;
      margin-bottom: 36px;
    }

    .spinner-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #3a3a3a;
      border-top-color: #a874c0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 13px;
      color: #6a6a6a;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .version {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: #3a3a3a;
    }
  </style>
</head>
<body>
  <img class="logo" id="logoPhiloCyber" alt="PhiloCyber logo" />
  <div class="title">AgenticTM</div>
  <div class="subtitle">Multi-Agent Threat Modeling</div>

  <div class="spinner-wrapper">
    <div class="spinner"></div>
    <div class="status">Starting backend server...</div>
  </div>

  <div class="version">v0.3.6</div>
  <script>
    const q = new URLSearchParams(window.location.search);
    const logoDataUri = q.get('logoDataUri') || '';
    const logoEl = document.getElementById('logoPhiloCyber');
    if (logoEl && logoDataUri) {
      logoEl.src = logoDataUri;
    }
  </script>
</body>
</html>
