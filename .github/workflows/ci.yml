name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check . --output-format github
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy type check
        run: mypy agentictm/ --ignore-missing-imports --no-error-summary

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ test_json_parser.py -v --tb=short --cov=agentictm --cov-report=term-missing
        env:
          AGENTICTM_API_KEY: "test-ci-key"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t agentictm:${{ github.sha }} .
      - name: Verify image
        run: docker run --rm agentictm:${{ github.sha }} python -c "from agentictm.config import AgenticTMConfig; print('OK')"
